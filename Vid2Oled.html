<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Video to OLED Animation Converter</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #1e1e1e; color: #fff; max-width: 900px; margin: 0 auto; padding: 20px; }
        .container { display: flex; gap: 20px; margin-bottom: 20px; flex-wrap: wrap; }
        .box { background: #2d2d2d; padding: 15px; border-radius: 8px; flex: 1; min-width: 300px; }
        canvas { background: #000; border: 2px solid #555; image-rendering: pixelated; width: 256px; height: 128px; }
        video { width: 100%; max-width: 256px; background: #000; display: block; margin-bottom: 10px; }
        textarea { width: 100%; height: 250px; background: #111; color: #4af626; font-family: monospace; padding: 10px; border: 1px solid #444; border-radius: 5px; box-sizing: border-box; }
        button { background: #007bff; color: white; border: none; padding: 10px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        button:hover { background: #0056b3; }
        button:disabled { background: #555; cursor: not-allowed; }
        .btn-success { background: #28a745; margin-bottom: 10px; }
        .btn-success:hover { background: #218838; }
        label { display: block; margin-top: 10px; font-size: 14px; color: #ccc; }
        input[type="range"] { width: 100%; }
    </style>
</head>
<body>
    <h2>ESP32 OLED Video Animation Converter</h2>
    
    <div class="container">
        <div class="box">
            <h3>1. Input Video</h3>
            <input type="file" id="upload" accept="video/*">
            <video id="video" controls muted></video>
            
            <label>Target FPS: <span id="fpsVal">10</span></label>
            <input type="range" id="fps" min="1" max="30" value="10" oninput="document.getElementById('fpsVal').innerText = this.value">
            
            <label>B/W Threshold: <span id="threshVal">128</span></label>
            <input type="range" id="threshold" min="0" max="255" value="128" oninput="document.getElementById('threshVal').innerText = this.value">
            
            <button id="convertBtn" disabled>Mulai Extract Frame-by-Frame</button>
        </div>

        <div class="box">
            <h3>2. OLED Preview</h3>
            <canvas id="canvas" width="128" height="64"></canvas>
            <p id="status" style="color: #ffcc00;">Status: Menunggu video...</p>
            <p>Total Frame: <b id="frameCount">0</b></p>
        </div>
    </div>

    <div class="box">
        <h3>3. Hasil Array C++</h3>
        <button id="copyBtn" class="btn-success">📋 Copy Code ke Clipboard</button>
        <textarea id="output" readonly placeholder="Kode C++ akan muncul di sini..."></textarea>
    </div>

    <script>
        const upload = document.getElementById('upload');
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        const output = document.getElementById('output');
        const status = document.getElementById('status');
        const convertBtn = document.getElementById('convertBtn');
        const copyBtn = document.getElementById('copyBtn');
        const frameCountSpan = document.getElementById('frameCount');

        let isConverting = false;

        upload.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if(file) {
                video.src = URL.createObjectURL(file);
                convertBtn.disabled = false;
                status.innerText = "Video siap. Klik Mulai.";
            }
        });

        video.addEventListener('timeupdate', () => {
            if(!isConverting) drawPreview();
        });

        document.getElementById('threshold').addEventListener('input', drawPreview);

        function drawPreview() {
            ctx.drawImage(video, 0, 0, 128, 64);
            const threshold = parseInt(document.getElementById('threshold').value);
            const imageData = ctx.getImageData(0, 0, 128, 64);
            const data = imageData.data;
            for (let i = 0; i < data.length; i += 4) {
                let avg = (data[i] + data[i+1] + data[i+2]) / 3;
                let color = avg > threshold ? 255 : 0;
                data[i] = data[i+1] = data[i+2] = color;
            }
            ctx.putImageData(imageData, 0, 0);
        }

        convertBtn.addEventListener('click', async () => {
            if(isConverting) return;
            isConverting = true;
            convertBtn.disabled = true;
            output.value = "Memproses... Mohon tunggu.";
            frameCountSpan.innerText = "0";

            let framesData = [];
            const fps = parseInt(document.getElementById('fps').value);
            const threshold = parseInt(document.getElementById('threshold').value);
            const duration = video.duration;
            const totalFrames = Math.floor(duration * fps);
            const interval = 1 / fps;

            status.innerText = "Mengekstrak frame...";
            video.pause();

            for (let i = 0; i < totalFrames; i++) {
                video.currentTime = i * interval;
                
                await new Promise(resolve => {
                    video.onseeked = resolve;
                });

                ctx.drawImage(video, 0, 0, 128, 64);
                drawPreview();

                const imageData = ctx.getImageData(0, 0, 128, 64);
                const data = imageData.data;
                let byteArray = [];

                // PERBAIKAN: Looping Horizontal (Kiri ke Kanan, Atas ke Bawah)
                for (let y = 0; y < 64; y++) {
                    for (let x_byte = 0; x_byte < 16; x_byte++) {
                        let byte = 0;
                        for (let bit = 0; bit < 8; bit++) {
                            let x = (x_byte * 8) + bit;
                            let pos = (y * 128 + x) * 4;
                            let avg = (data[pos] + data[pos+1] + data[pos+2]) / 3;
                            
                            // Jika lebih terang dari threshold, set bit menjadi 1 (MSB ke LSB)
                            if (avg > threshold) {
                                byte |= (1 << (7 - bit)); 
                            }
                        }
                        byteArray.push("0x" + byte.toString(16).padStart(2, '0'));
                    }
                }
                framesData.push(`  {\n    ${byteArray.join(", ")}\n  }`);
                frameCountSpan.innerText = framesData.length;
            }

            const finalCode = 
`#include <Arduino.h>

const int TOTAL_FRAMES = ${framesData.length};
const int FRAME_DELAY = ${Math.floor(1000 / fps)};

const unsigned char video_frames[][1024] PROGMEM = {
${framesData.join(",\n")}
};`;
            
            output.value = finalCode;
            status.innerText = "Selesai! Silakan copy kode di bawah.";
            isConverting = false;
            convertBtn.disabled = false;
        });

        copyBtn.addEventListener('click', () => {
            output.select();
            document.execCommand('copy');
            const originalText = copyBtn.innerText;
            copyBtn.innerText = "✅ Berhasil Di-copy!";
            setTimeout(() => copyBtn.innerText = originalText, 2000);
        });
    </script>
</body>
</html>
